<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyftr</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --accent: #c8f542;
    --accent-dim: rgba(200,245,66,0.12);
    --accent-dark: #8fb52e;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --red: #ff5252;
    --blue: #4da6ff;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; padding: 28px 32px; }

  /* Sidebar */
  .logo { padding: 22px 20px 16px; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .nav-section { padding: 8px 12px 4px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; border-radius: 7px; margin: 1px 8px; color: var(--text2); transition: all .15s; font-size: 13px; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sidebar-footer { margin-top: auto; padding: 16px; }
  .mode-toggle { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
  .mode-btn { flex: 1; padding: 6px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all .15s; }
  .mode-btn.active { background: var(--accent); color: #000; font-weight: 600; }

  /* Page header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .page-sub { color: var(--text2); font-size: 13px; margin-top: 3px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #d4f955; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: rgba(255,82,82,0.15); color: var(--red); border: 1px solid rgba(255,82,82,0.3); }
  .btn-danger:hover { background: rgba(255,82,82,0.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn svg { width: 15px; height: 15px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card + .card { margin-top: 12px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* Stat cards */
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  .stat-value.accent { color: var(--accent); }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; transition: border-color .15s; font-family: var(--font); }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; align-items: end; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Tags / badges */
  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-green { background: rgba(200,245,66,0.15); color: var(--accent); }
  .badge-blue { background: rgba(77,166,255,0.15); color: var(--blue); }
  .badge-gray { background: var(--surface3); color: var(--text2); }

  /* Table */
  .table { width: 100%; border-collapse: collapse; }
  .table th { text-align: left; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; vertical-align: middle; }
  .table tr:last-child td { border-bottom: none; }
  .table tr:hover td { background: var(--surface2); }

  /* Exercise list */
  .exercise-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--surface2); border-radius: 8px; margin-bottom: 6px; }
  .ex-num { width: 24px; height: 24px; background: var(--accent-dim); color: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .ex-name { flex: 1; font-weight: 500; }
  .ex-sets { color: var(--text2); font-size: 12px; }
  .ex-actions { display: flex; gap: 4px; }

  /* Day pill */
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .day-label { font-size: 13px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 6px; }
  .day-block { margin-bottom: 18px; }

  /* Progress bar */
  .progress-wrap { background: var(--surface3); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }

  /* Member avatar */
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-dim); border: 1px solid rgba(200,245,66,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 540px; max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close { background: var(--surface2); border: none; color: var(--text2); width: 30px; height: 30px; border-radius: 7px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: var(--surface3); color: var(--text); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  /* Share code */
  .share-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
  .share-code { font-family: monospace; font-size: 18px; font-weight: 700; letter-spacing: 4px; color: var(--accent); }

  /* Checkbox */
  .check-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: background .1s; }
  .check-item:hover { background: var(--surface2); }
  .check-box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .check-box.done { background: var(--accent); border-color: var(--accent); }

  /* Section heading */
  .section-head { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--accent); z-index: 200; transform: translateY(80px); opacity: 0; transition: all .25s; pointer-events: none; }
  #toast.show { transform: translateY(0); opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* QR Modal */
  .qr-wrap { background: #fff; border-radius: 12px; padding: 16px; display: inline-block; }
  .link-copy-box { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .link-copy-box input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 12px; font-family: monospace; }
  .link-copy-box button { flex-shrink: 0; }

  /* Hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loading-screen" style="position:fixed;inset:0;background:#0f0f0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999">
  <div style="font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:16px">lyftr<span style="color:#c8f542">.</span></div>
  <div style="width:40px;height:3px;background:#222;border-radius:2px;overflow:hidden">
    <div id="load-bar" style="width:0%;height:100%;background:#c8f542;border-radius:2px;transition:width .4s"></div>
  </div>
</div>

<div id="toast"></div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">lyftr<span>.</span></div>

    <div class="nav-section">Koç Paneli</div>
    <div class="nav-item active" onclick="navigate('programs')" id="nav-programs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Programlar
    </div>
    <div class="nav-item" onclick="navigate('members')" id="nav-members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Üyeler
    </div>
    <div class="nav-item" onclick="navigate('overview')" id="nav-overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Genel Bakış
    </div>

    <div class="sidebar-footer">
      <div class="mode-toggle">
        <div class="mode-btn active" id="mode-coach" onclick="setMode('coach')">Koç</div>
        <div class="mode-btn" id="mode-member" onclick="setMode('member')">Üye</div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main" id="main-content"></div>
</div>

<!-- Create Program Modal -->
<div class="modal-bg" id="modal-program">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-program-title">Yeni Program</div>
      <button class="modal-close" onclick="closeModal('modal-program')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Program Adı</label>
      <input class="form-input" id="prog-name" placeholder="örn. Nick Walker 5 Gün Split">
    </div>
    <div class="form-group">
      <label class="form-label">Açıklama</label>
      <input class="form-input" id="prog-desc" placeholder="Kısa açıklama...">
    </div>
    <div class="divider"></div>
    <div id="days-container"></div>
    <button class="btn btn-ghost btn-sm" onclick="addDay()" style="margin-bottom:16px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Gün Ekle
    </button>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('modal-program')">İptal</button>
      <button class="btn btn-primary" onclick="saveProgram()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Assign Modal -->
<div class="modal-bg" id="modal-assign">
  <div class="modal" style="width:400px">
    <div class="modal-header">
      <div class="modal-title">Üyeye Ata</div>
      <button class="modal-close" onclick="closeModal('modal-assign')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Program</label>
      <select class="form-input" id="assign-prog"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Üye</label>
      <select class="form-input" id="assign-member"></select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('modal-assign')">İptal</button>
      <button class="btn btn-primary" onclick="doAssign()">Ata</button>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal-bg" id="modal-member">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <div class="modal-title">Yeni Üye</div>
      <button class="modal-close" onclick="closeModal('modal-member')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Ad Soyad</label>
      <input class="form-input" id="member-name" placeholder="örn. Ahmet Yılmaz">
    </div>
    <div class="form-group">
      <label class="form-label">Erişim Kodu (üye girişi için)</label>
      <input class="form-input" id="member-code" placeholder="örn. AHMET01" style="text-transform:uppercase">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('modal-member')">İptal</button>
      <button class="btn btn-primary" onclick="saveMember()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Share / QR Modal -->
<div class="modal-bg" id="modal-share">
  <div class="modal" style="width:420px;text-align:center">
    <div class="modal-header" style="text-align:left">
      <div class="modal-title" id="share-modal-name">Üye Paylaşım Linki</div>
      <button class="modal-close" onclick="closeModal('modal-share')">✕</button>
    </div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:20px;text-align:left">Bu linki veya QR kodu üyene gönder. Tıkladığında direkt programına açılır.</p>

    <div style="margin-bottom:20px">
      <div class="qr-wrap" id="qr-container"></div>
    </div>

    <div style="margin-bottom:16px;text-align:left">
      <div class="form-label" style="margin-bottom:6px">Paylaşım Linki</div>
      <div class="link-copy-box">
        <input type="text" id="share-link-input" readonly>
        <button class="btn btn-primary btn-sm" onclick="copyShareLink()">Kopyala</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;align-items:center;background:var(--surface2);border-radius:8px;padding:10px 14px;margin-bottom:16px">
      <div style="font-size:20px">🔑</div>
      <div style="text-align:left">
        <div style="font-size:11px;color:var(--text3);margin-bottom:2px">Erişim Kodu</div>
        <div id="share-code-display" style="font-family:monospace;font-size:18px;font-weight:700;letter-spacing:3px;color:var(--accent)"></div>
      </div>
    </div>

    <button class="btn btn-ghost" onclick="closeModal('modal-share')" style="width:100%">Kapat</button>
  </div>
</div>

<!-- Member Login Modal -->
<div class="modal-bg" id="modal-login">
  <div class="modal" style="width:360px">
    <div class="modal-header">
      <div class="modal-title">Üye Girişi</div>
      <button class="modal-close" onclick="closeModal('modal-login')">✕</button>
    </div>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Koçunun sana verdiği erişim kodunu gir.</p>
    <div class="form-group">
      <label class="form-label">Erişim Kodu</label>
      <input class="form-input" id="login-code" placeholder="örn. AHMET01" style="text-transform:uppercase;font-size:18px;letter-spacing:2px;text-align:center">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('modal-login')">İptal</button>
      <button class="btn btn-primary" onclick="doLogin()">Giriş</button>
    </div>
  </div>
</div>

<script type="module">
// ─── FIREBASE ────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnz94has1M8SSStOU2QvHOvlxUHxfLp_A",
  authDomain: "lyftrapp.firebaseapp.com",
  projectId: "lyftrapp",
  storageBucket: "lyftrapp.firebasestorage.app",
  messagingSenderId: "784863385313",
  appId: "1:784863385313:web:99f3b2a4c6ce736dc2c9a0"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ─── STATE ────────────────────────────────────────────────
let state = {
  mode: 'coach',
  currentPage: 'programs',
  loggedMember: null,
  editingProgId: null,
  programs: [],
  members: [],
  assignments: [],
  logs: {},
  completions: {},
};

let tmpDays = [];

// ─── STORAGE ─────────────────────────────────────────────
async function save() {
  try {
    await setDoc(doc(db, 'lyftr', 'data'), {
      programs: state.programs,
      members: state.members,
      assignments: state.assignments,
      logs: state.logs,
      completions: state.completions,
      updatedAt: Date.now(),
    });
  } catch(e) { console.error('Firebase save error:', e); toast('Kayıt hatası!'); }
}

async function load() {
  try {
    const snap = await getDoc(doc(db, 'lyftr', 'data'));
    if (snap.exists()) {
      const d = snap.data();
      state.programs = d.programs || [];
      state.members = d.members || [];
      state.assignments = d.assignments || [];
      state.logs = d.logs || {};
      state.completions = d.completions || {};
    }
  } catch(e) { console.error('Firebase load error:', e); }
}

function navigate(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  render();
}

function setMode(mode) {
  if (mode === 'member') {
    openModal('modal-login');
    return;
  }
  state.mode = 'coach';
  state.loggedMember = null;
  document.getElementById('mode-coach').classList.add('active');
  document.getElementById('mode-member').classList.remove('active');
  navigate('programs');
}

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const el = document.getElementById('main-content');
  if (state.mode === 'member' && state.loggedMember) {
    el.innerHTML = renderMemberView();
  } else if (state.currentPage === 'programs') {
    el.innerHTML = renderPrograms();
  } else if (state.currentPage === 'members') {
    el.innerHTML = renderMembers();
  } else if (state.currentPage === 'overview') {
    el.innerHTML = renderOverview();
  }
}

// ─── COACH: PROGRAMS ─────────────────────────────────────
function renderPrograms() {
  const progs = state.programs;
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Programlar</div>
        <div class="page-sub">${progs.length} program oluşturuldu</div>
      </div>
      <button class="btn btn-primary" onclick="openCreateProgram()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Yeni Program
      </button>
    </div>

    ${progs.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <p>Henüz program yok.<br>Sağ üstten yeni program oluştur.</p>
      </div>
    ` : progs.map(p => {
      const assignCount = state.assignments.filter(a => a.programId === p.id).length;
      const totalEx = p.days.reduce((acc, d) => acc + d.exercises.length, 0);
      return `
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:flex-start;justify-content:space-between">
            <div style="flex:1">
              <div style="font-size:16px;font-weight:700;margin-bottom:4px">${p.name}</div>
              <div style="color:var(--text2);font-size:13px;margin-bottom:12px">${p.desc || 'Açıklama yok'}</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <span class="badge badge-green">${p.days.length} gün</span>
                <span class="badge badge-gray">${totalEx} egzersiz</span>
                <span class="badge badge-blue">${assignCount} üye</span>
              </div>
            </div>
            <div style="display:flex;gap:6px;margin-left:16px">
              <button class="btn btn-ghost btn-sm" onclick="editProgram('${p.id}')">Düzenle</button>
              <button class="btn btn-ghost btn-sm" onclick="openAssign('${p.id}')">Ata</button>
              <button class="btn btn-danger btn-sm" onclick="deleteProgram('${p.id}')">Sil</button>
            </div>
          </div>
          <div class="divider" style="margin:16px 0 12px"></div>
          <div class="section-head">Günler</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${p.days.map((d, i) => `
              <div style="background:var(--surface2);border-radius:8px;padding:6px 12px;font-size:12px">
                <span style="color:var(--accent);font-weight:600">${d.name}</span>
                <span style="color:var(--text3);margin-left:6px">${d.exercises.length} egzersiz</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('')}
  `;
}

// ─── COACH: MEMBERS ──────────────────────────────────────
function renderMembers() {
  const members = state.members;
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Üyeler</div>
        <div class="page-sub">${members.length} aktif üye</div>
      </div>
      <button class="btn btn-primary" onclick="openModal('modal-member')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Üye Ekle
      </button>
    </div>

    ${members.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">👤</div>
        <p>Henüz üye yok.<br>Üye ekleyerek program atayabilirsin.</p>
      </div>
    ` : `
      <div class="card" style="padding:0;overflow:hidden">
        <table class="table">
          <thead>
            <tr>
              <th>Üye</th>
              <th>Erişim Kodu</th>
              <th>Atanan Program</th>
              <th>İlerleme</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${members.map(m => {
              const assignment = state.assignments.find(a => a.memberId === m.id);
              const prog = assignment ? state.programs.find(p => p.id === assignment.programId) : null;
              let progress = 0;
              if (prog) {
                const totalSets = prog.days.reduce((acc, d) => acc + d.exercises.reduce((a2, ex) => a2 + ex.sets, 0), 0);
                const doneSets = Object.keys(state.completions).filter(k => k.startsWith(m.id + '_' + prog.id + '_')).length;
                progress = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;
              }
              return `
                <tr>
                  <td>
                    <div style="display:flex;align-items:center;gap:10px">
                      <div class="avatar">${m.name.charAt(0).toUpperCase()}</div>
                      <span style="font-weight:500">${m.name}</span>
                    </div>
                  </td>
                  <td>
                    <div class="share-code" style="font-size:14px;letter-spacing:2px">${m.code}</div>
                  </td>
                  <td>${prog ? `<span class="badge badge-green">${prog.name}</span>` : '<span class="badge badge-gray">Atanmadı</span>'}</td>
                  <td style="min-width:120px">
                    ${prog ? `
                      <div style="display:flex;align-items:center;gap:8px">
                        <div class="progress-wrap" style="flex:1"><div class="progress-bar" style="width:${progress}%"></div></div>
                        <span style="font-size:11px;color:var(--text2);min-width:28px">${progress}%</span>
                      </div>
                    ` : '—'}
                  </td>
                  <td>
                    <div style="display:flex;gap:6px">
                      <button class="btn btn-ghost btn-sm" onclick="openAssignForMember('${m.id}')">Ata</button>
                      <button class="btn btn-primary btn-sm" onclick="openShare('${m.id}')">🔗 Link</button>
                      <button class="btn btn-danger btn-sm" onclick="deleteMember('${m.id}')">Sil</button>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `}
  `;
}

// ─── COACH: OVERVIEW ─────────────────────────────────────
function renderOverview() {
  const totalSets = state.programs.reduce((acc, p) =>
    acc + p.days.reduce((a2, d) => a2 + d.exercises.reduce((a3, ex) => a3 + ex.sets, 0), 0), 0);
  const totalDone = Object.keys(state.completions).length;

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Genel Bakış</div>
        <div class="page-sub">Tüm üyelerin antrenman özeti</div>
      </div>
    </div>

    <div class="grid-3" style="margin-bottom:20px">
      <div class="stat-card">
        <div class="stat-label">Toplam Program</div>
        <div class="stat-value accent">${state.programs.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Toplam Üye</div>
        <div class="stat-value">${state.members.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tamamlanan Set</div>
        <div class="stat-value">${totalDone}</div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600">Üye Aktivitesi</div>
      ${state.members.length === 0 ? `<div class="empty"><p>Henüz üye yok.</p></div>` :
        state.members.map(m => {
          const assignment = state.assignments.find(a => a.memberId === m.id);
          const prog = assignment ? state.programs.find(p => p.id === assignment.programId) : null;
          let progress = 0, done = 0, total = 0;
          if (prog) {
            total = prog.days.reduce((acc, d) => acc + d.exercises.reduce((a2, ex) => a2 + ex.sets, 0), 0);
            done = Object.keys(state.completions).filter(k => k.startsWith(m.id + '_' + prog.id + '_')).length;
            progress = total > 0 ? Math.round((done / total) * 100) : 0;
          }
          return `
            <div style="padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;gap:14px">
              <div class="avatar">${m.name.charAt(0).toUpperCase()}</div>
              <div style="flex:1">
                <div style="font-weight:500;margin-bottom:4px">${m.name}</div>
                <div style="font-size:12px;color:var(--text2)">${prog ? prog.name : 'Program atanmadı'}</div>
              </div>
              ${prog ? `
                <div style="min-width:160px">
                  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                    <span style="font-size:11px;color:var(--text3)">${done}/${total} set</span>
                    <span style="font-size:11px;color:var(--accent);font-weight:600">${progress}%</span>
                  </div>
                  <div class="progress-wrap"><div class="progress-bar" style="width:${progress}%"></div></div>
                </div>
              ` : '<span class="badge badge-gray">Atanmadı</span>'}
            </div>
          `;
        }).join('')}
    </div>
  `;
}

// ─── MEMBER VIEW ─────────────────────────────────────────
function renderMemberView() {
  const m = state.loggedMember;
  const assignment = state.assignments.find(a => a.memberId === m.id);
  const prog = assignment ? state.programs.find(p => p.id === assignment.programId) : null;

  if (!prog) return `
    <div class="page-header">
      <div>
        <div class="page-title">Merhaba, ${m.name} 👋</div>
        <div class="page-sub">Henüz bir program atanmadı.</div>
      </div>
    </div>
    <div class="empty">
      <div class="empty-icon">⏳</div>
      <p>Koçun sana program atadığında burada görünecek.</p>
    </div>
  `;

  const totalSets = prog.days.reduce((acc, d) => acc + d.exercises.reduce((a2, ex) => a2 + ex.sets, 0), 0);
  const doneSets = Object.keys(state.completions).filter(k => k.startsWith(m.id + '_' + prog.id + '_')).length;
  const progress = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Merhaba, ${m.name} 👋</div>
        <div class="page-sub">${prog.name}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:700;color:var(--accent)">${progress}%</div>
        <div style="font-size:11px;color:var(--text2)">${doneSets}/${totalSets} set</div>
      </div>
    </div>

    <div class="progress-wrap" style="margin-bottom:24px;height:8px">
      <div class="progress-bar" style="width:${progress}%"></div>
    </div>

    ${prog.days.map((day, di) => {
      const dayDone = day.exercises.every((ex, ei) => {
        for (let si = 0; si < ex.sets; si++) {
          if (!state.completions[`${m.id}_${prog.id}_${di}_${ei}_${si}`]) return false;
        }
        return true;
      });
      return `
        <div class="day-block">
          <div class="day-header">
            <div class="day-label">
              ${dayDone ? '✅' : '📅'} ${day.name}
            </div>
            ${dayDone ? '<span class="badge badge-green">Tamamlandı</span>' : ''}
          </div>
          ${day.exercises.map((ex, ei) => {
            const sets = [];
            for (let si = 0; si < ex.sets; si++) {
              const key = `${m.id}_${prog.id}_${di}_${ei}_${si}`;
              const done = !!state.completions[key];
              const weight = state.logs[key] || '';
              sets.push(`
                <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
                  <div class="check-box ${done ? 'done' : ''}" onclick="toggleSet('${key}')">
                    ${done ? '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
                  </div>
                  <span style="font-size:12px;color:var(--text2);min-width:44px">Set ${si+1}</span>
                  <span style="font-size:12px;color:var(--text2);min-width:70px">${ex.reps} tekrar</span>
                  <input class="form-input" style="width:90px;padding:5px 8px;font-size:12px" 
                    placeholder="kg" value="${weight}"
                    onchange="logWeight('${key}', this.value)">
                  <span style="font-size:11px;color:var(--text3)">kg</span>
                </div>
              `);
            }
            return `
              <div class="card" style="margin-bottom:8px;padding:14px 16px">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
                  <div>
                    <span style="font-weight:600">${ex.name}</span>
                    <span class="badge badge-gray" style="margin-left:8px">${ex.sets} × ${ex.reps}</span>
                    ${ex.note ? `<div style="font-size:11px;color:var(--text2);margin-top:3px">${ex.note}</div>` : ''}
                  </div>
                </div>
                ${sets.join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }).join('')}
  `;
}

// ─── PROGRAM MODAL ───────────────────────────────────────
function openCreateProgram() {
  state.editingProgId = null;
  document.getElementById('modal-program-title').textContent = 'Yeni Program';
  document.getElementById('prog-name').value = '';
  document.getElementById('prog-desc').value = '';
  tmpDays = [{ name: 'Gün 1', exercises: [] }];
  renderDays();
  openModal('modal-program');
}

function editProgram(id) {
  const p = state.programs.find(x => x.id === id);
  if (!p) return;
  state.editingProgId = id;
  document.getElementById('modal-program-title').textContent = 'Programı Düzenle';
  document.getElementById('prog-name').value = p.name;
  document.getElementById('prog-desc').value = p.desc || '';
  tmpDays = JSON.parse(JSON.stringify(p.days));
  renderDays();
  openModal('modal-program');
}

function renderDays() {
  const container = document.getElementById('days-container');
  container.innerHTML = tmpDays.map((day, di) => `
    <div style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <input class="form-input" style="flex:1" value="${day.name}" 
          onchange="tmpDays[${di}].name=this.value">
        <button class="btn btn-danger btn-sm" onclick="removeDay(${di})" ${tmpDays.length===1?'disabled':''}>Günü Sil</button>
      </div>
      <div id="exlist-${di}">
        ${day.exercises.map((ex, ei) => renderExerciseRow(di, ei, ex)).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="addExercise(${di})" style="margin-top:6px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Egzersiz Ekle
      </button>
    </div>
  `).join('');
}

function renderExerciseRow(di, ei, ex) {
  return `
    <div class="form-row" style="margin-bottom:6px" id="exrow-${di}-${ei}">
      <div>
        ${ei===0 ? '<div class="form-label">Egzersiz</div>' : ''}
        <input class="form-input" value="${ex.name}" placeholder="Egzersiz adı"
          onchange="tmpDays[${di}].exercises[${ei}].name=this.value">
      </div>
      <div>
        ${ei===0 ? '<div class="form-label">Set</div>' : ''}
        <input class="form-input" type="number" value="${ex.sets}" min="1" max="20"
          onchange="tmpDays[${di}].exercises[${ei}].sets=parseInt(this.value)||1">
      </div>
      <div>
        ${ei===0 ? '<div class="form-label">Tekrar</div>' : ''}
        <input class="form-input" value="${ex.reps}" placeholder="12"
          onchange="tmpDays[${di}].exercises[${ei}].reps=this.value">
      </div>
      <div>
        ${ei===0 ? '<div class="form-label">&nbsp;</div>' : ''}
        <button class="btn btn-danger btn-sm" onclick="removeExercise(${di},${ei})">✕</button>
      </div>
    </div>
  `;
}

function addDay() {
  tmpDays.push({ name: `Gün ${tmpDays.length + 1}`, exercises: [] });
  renderDays();
}

function removeDay(di) {
  if (tmpDays.length === 1) return;
  tmpDays.splice(di, 1);
  renderDays();
}

function addExercise(di) {
  tmpDays[di].exercises.push({ name: '', sets: 3, reps: '10-12', note: '' });
  renderDays();
}

function removeExercise(di, ei) {
  tmpDays[di].exercises.splice(ei, 1);
  renderDays();
}

function saveProgram() {
  const name = document.getElementById('prog-name').value.trim();
  if (!name) { toast('Program adı giriniz'); return; }

  const prog = {
    id: state.editingProgId || uid(),
    name,
    desc: document.getElementById('prog-desc').value.trim(),
    days: tmpDays,
    createdAt: Date.now(),
  };

  if (state.editingProgId) {
    const idx = state.programs.findIndex(p => p.id === state.editingProgId);
    state.programs[idx] = prog;
  } else {
    state.programs.push(prog);
  }

  save();
  closeModal('modal-program');
  render();
  toast(state.editingProgId ? 'Program güncellendi' : 'Program oluşturuldu ✓');
  state.editingProgId = null;
}

function deleteProgram(id) {
  state.programs = state.programs.filter(p => p.id !== id);
  state.assignments = state.assignments.filter(a => a.programId !== id);
  save();
  render();
  toast('Program silindi');
}

// ─── ASSIGN ──────────────────────────────────────────────
function openAssign(progId) {
  const pSel = document.getElementById('assign-prog');
  const mSel = document.getElementById('assign-member');
  pSel.innerHTML = state.programs.map(p => `<option value="${p.id}" ${p.id===progId?'selected':''}>${p.name}</option>`).join('');
  mSel.innerHTML = state.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
  if (!state.members.length) { toast('Önce üye ekleyin'); return; }
  openModal('modal-assign');
}

function openAssignForMember(memberId) {
  const pSel = document.getElementById('assign-prog');
  const mSel = document.getElementById('assign-member');
  pSel.innerHTML = state.programs.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  mSel.innerHTML = state.members.map(m => `<option value="${m.id}" ${m.id===memberId?'selected':''}>${m.name}</option>`).join('');
  if (!state.programs.length) { toast('Önce program oluşturun'); return; }
  openModal('modal-assign');
}

function doAssign() {
  const progId = document.getElementById('assign-prog').value;
  const memberId = document.getElementById('assign-member').value;
  // Remove existing assignment for this member
  state.assignments = state.assignments.filter(a => a.memberId !== memberId);
  state.assignments.push({ memberId, programId: progId, assignedAt: Date.now() });
  save();
  closeModal('modal-assign');
  render();
  toast('Program atandı ✓');
}

// ─── MEMBERS ─────────────────────────────────────────────
function saveMember() {
  const name = document.getElementById('member-name').value.trim();
  const code = document.getElementById('member-code').value.trim().toUpperCase();
  if (!name || !code) { toast('Ad ve kod zorunludur'); return; }
  if (state.members.find(m => m.code === code)) { toast('Bu kod zaten kullanılıyor'); return; }
  state.members.push({ id: uid(), name, code });
  save();
  closeModal('modal-member');
  document.getElementById('member-name').value = '';
  document.getElementById('member-code').value = '';
  render();
  toast('Üye eklendi ✓');
}

function deleteMember(id) {
  state.members = state.members.filter(m => m.id !== id);
  state.assignments = state.assignments.filter(a => a.memberId !== id);
  save();
  render();
  toast('Üye silindi');
}

// ─── MEMBER LOGIN ────────────────────────────────────────
function doLogin() {
  const code = document.getElementById('login-code').value.trim().toUpperCase();
  const member = state.members.find(m => m.code === code);
  if (!member) { toast('Geçersiz kod'); return; }
  state.loggedMember = member;
  state.mode = 'member';
  document.getElementById('mode-coach').classList.remove('active');
  document.getElementById('mode-member').classList.add('active');
  closeModal('modal-login');
  document.getElementById('login-code').value = '';
  render();
  toast(`Hoş geldin, ${member.name}! 👋`);
}

// ─── MEMBER TRACKING ─────────────────────────────────────
function toggleSet(key) {
  if (state.completions[key]) {
    delete state.completions[key];
  } else {
    state.completions[key] = true;
  }
  save();
  render();
}

function logWeight(key, val) {
  if (val) {
    state.logs[key] = val;
  } else {
    delete state.logs[key];
  }
  save();
}

// ─── UTILS ───────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).substr(2,9);
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── SHARE / QR ──────────────────────────────────────────
function openShare(memberId) {
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;

  document.getElementById('share-modal-name').textContent = m.name + ' — Paylaşım';
  document.getElementById('share-code-display').textContent = m.code;

  const base = window.location.href.split('?')[0];
  const link = base + '?kod=' + encodeURIComponent(m.code);
  document.getElementById('share-link-input').value = link;

  // Generate QR using qrcode.js
  const container = document.getElementById('qr-container');
  container.innerHTML = '';
  if (window.QRCode) {
    new QRCode(container, {
      text: link,
      width: 160,
      height: 160,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    });
  } else {
    container.innerHTML = '<div style="width:160px;height:160px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:8px;color:#333;font-size:12px;text-align:center;padding:12px">QR kütüphanesi yüklenemedi</div>';
  }

  openModal('modal-share');
}

function copyShareLink() {
  const val = document.getElementById('share-link-input').value;
  navigator.clipboard.writeText(val).then(() => toast('Link kopyalandı ✓')).catch(() => {
    document.getElementById('share-link-input').select();
    document.execCommand('copy');
    toast('Link kopyalandı ✓');
  });
}

// ─── INIT ────────────────────────────────────────────────
// Expose functions to window for inline HTML onclick handlers
Object.assign(window, {
  navigate, setMode, openCreateProgram, editProgram, deleteProgram,
  openAssign, openAssignForMember, doAssign, saveMember, deleteMember,
  doLogin, toggleSet, logWeight, openShare, copyShareLink,
  openModal, closeModal, addDay, removeDay, addExercise, removeExercise, saveProgram
});

(async () => {
  // Loading animation
  const bar = document.getElementById('load-bar');
  bar.style.width = '40%';

  await load();
  bar.style.width = '100%';

  setTimeout(() => {
    document.getElementById('loading-screen').style.display = 'none';
  }, 400);

  // Check URL param ?kod=XXX for direct member login
  const params = new URLSearchParams(window.location.search);
  const kod = params.get('kod');
  if (kod) {
    const member = state.members.find(m => m.code === kod.toUpperCase());
    if (member) {
      state.loggedMember = member;
      state.mode = 'member';
      document.getElementById('mode-coach').classList.remove('active');
      document.getElementById('mode-member').classList.add('active');
      ['nav-programs','nav-members','nav-overview'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
    }
  }

  render();
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
